# fmindex daemon configuration.
#
# Keep this path stable. For production updates, point it at a "current"
# symlink and atomically switch that symlink after building a new index version.
index_path=/opt/fmindex/indexes/current/cache.fm
bind=127.0.0.1
port=8080

# Optional. When set, POST /rebuild starts this command in the background.
# Keep the daemon bound to 127.0.0.1 or protect this endpoint with a trusted
# reverse proxy, because it intentionally triggers a local command.
# rebuild_command=/opt/fmindex/bin/build_fmindex.sh